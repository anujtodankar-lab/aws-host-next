name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aws-host-next:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aws-host-next:latest

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/aws-host-next:latest

            docker stop next-app || true
            docker rm next-app || true

            docker run -d \
              --name next-app \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/aws-host-next:latest